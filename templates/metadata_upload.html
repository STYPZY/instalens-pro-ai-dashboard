{% extends "layout.html" %}

{% block content %}

<div class="page-header">
  <div>
    <h2>Metadata Analyzer</h2>
    <p>Extract hashes and metadata from any media file</p>
  </div>
</div>

<div class="card" style="max-width:620px;">

<div class="card-hd">
<div>
<div class="card-title">Upload File</div>
<div class="card-sub">Image · Video · Any Media File</div>
</div>
<span class="card-badge">Forensics</span>
</div>

<form method="POST" enctype="multipart/form-data">

{% if error %}
<div style="background: rgba(251,113,133,0.1); border:1px solid rgba(251,113,133,0.3); border-radius:8px; padding:10px 16px; margin-bottom:16px; font-size:12px; color:#fb7185;">
⚠ {{ error }}
</div>
{% endif %}

<div class="upload-zone" id="upload-zone">

<input type="file" name="file" id="file-input">

<div id="upload-default">

<div class="upload-icon">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
<rect x="3" y="3" width="18" height="18" rx="2"/>
</svg>
</div>

<div class="upload-title">Drop file here</div>
<div class="upload-sub">Analyze file metadata and hashes</div>

</div>

<div id="upload-selected" style="display:none;">

<div class="upload-icon selected">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<polyline points="20 6 9 17 4 12"/>
</svg>
</div>

<div class="upload-title" style="color:var(--accent-primary)">File Ready</div>
<div class="upload-filename" id="upload-filename">—</div>
<div class="upload-filesize" id="upload-filesize">—</div>

</div>

</div>

<div style="margin-top:20px;">
<button type="submit">Analyze Metadata</button>
</div>

</form>

</div>

<script>

const fileInput = document.getElementById('file-input')
const zone = document.getElementById('upload-zone')

const defaultView = document.getElementById('upload-default')
const selectedView = document.getElementById('upload-selected')

const filename = document.getElementById('upload-filename')
const filesize = document.getElementById('upload-filesize')

function formatSize(bytes){
if(bytes<1024) return bytes+' B'
if(bytes<1024*1024) return (bytes/1024).toFixed(1)+' KB'
return (bytes/(1024*1024)).toFixed(1)+' MB'
}

fileInput.addEventListener('change',function(){

const file=this.files[0]
if(!file)return

defaultView.style.display='none'
selectedView.style.display=''

filename.textContent=file.name
filesize.textContent=formatSize(file.size)

})

zone.addEventListener('dragover',e=>{
e.preventDefault()
})

zone.addEventListener('drop',e=>{
e.preventDefault()
fileInput.files=e.dataTransfer.files
fileInput.dispatchEvent(new Event('change'))
})

</script>

{% endblock %}
