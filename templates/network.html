{% extends "layout.html" %}
{% block content %}

<h2>Follower Network Graph</h2>
<div id="graph"></div>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<script>
var nodes=[]
var edges=[]

{% if dashboard %}

{% for f in dashboard.followers[:50] %}
nodes.push({id:"{{f}}",label:"{{f}}"})
edges.push({from:"root",to:"{{f}}"})
{% endfor %}

nodes.push({id:"root",label:"YOU"})
{% endif %}

var container=document.getElementById("graph")
var data={nodes:new vis.DataSet(nodes),edges:new vis.DataSet(edges)}
var network=new vis.Network(container,data,{})
</script>

<footer style="text-align:center; margin-top:20px; padding:10px; font-size:14px;">
Powered By Stypzy
</footer>

{% endblock %}
