{% extends "layout.html" %}

{% block content %}

<div class="page-header">
  <div>
    <h2>Follower Network Graph</h2>
    <p>Interactive visualisation of your Instagram connection network</p>
  </div>
  <div class="page-actions">
    <a href="{{ url_for('dashboard', dashboard_id=dashboard_id) }}" class="btn btn-ghost btn-sm">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back
    </a>
    <div class="icon-btn" title="Fit to screen" onclick="if(window._visNetwork) window._visNetwork.fit()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </div>
  </div>
</div>

<div id="network"></div>

<script>
window.network_data = {
  followers: {{ dashboard.connections.followers | tojson }},
  following: {{ dashboard.connections.following | tojson }}
};
</script>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script src="{{ url_for('static', filename='js/network.js') }}"></script>

{% endblock %}
