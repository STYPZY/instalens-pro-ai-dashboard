{% extends "layout.html" %}

{% block content %}

<div class="page-header">
  <div>
    <h2>Data Tables</h2>
    <p>Detailed breakdown of your Instagram connections</p>
  </div>
  <div class="page-actions">
    <a href="{{ url_for('export_followers', dashboard_id=dashboard_id) }}" class="export-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export CSV
    </a>
    <a href="{{ url_for('connections', dashboard_id=dashboard_id) }}" class="btn btn-ghost btn-sm">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back
    </a>
  </div>
</div>

<!-- Pass data to JS -->
<script>
const followersArr = {{ dashboard.connections.followers | tojson }};
const followingArr = {{ dashboard.connections.following | tojson }};
</script>

<!-- Tabs -->
<div class="dt-tabs">
  <button class="dt-tab active" data-tab="followers">
    Followers <span class="dt-badge" id="badge-followers">{{ dashboard.connections.followers | length }}</span>
  </button>
  <button class="dt-tab" data-tab="following">
    Following <span class="dt-badge" id="badge-following">{{ dashboard.connections.following | length }}</span>
  </button>
  <button class="dt-tab" data-tab="notfollowback">
    Not Following Back <span class="dt-badge rose" id="badge-notfollowback">—</span>
  </button>
  <button class="dt-tab" data-tab="fans">
    Fans <span class="dt-badge violet" id="badge-fans">—</span>
  </button>
</div>

<!-- Universal search -->
<div class="dt-search-wrap">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input type="text" id="universal-search" placeholder="Search usernames..." autocomplete="off" />
  <span id="search-count"></span>
</div>

<!-- List panels -->
<div class="dt-panel" id="panel-followers"></div>
<div class="dt-panel" id="panel-following" style="display:none"></div>
<div class="dt-panel" id="panel-notfollowback" style="display:none"></div>
<div class="dt-panel" id="panel-fans" style="display:none"></div>

<style>
/* ── Tabs ── */
.dt-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.dt-tab {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-secondary);
  font-size: 12px;
  font-family: var(--font-mono);
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.dt-tab:hover { border-color: var(--accent-primary); color: var(--text-primary); }
.dt-tab.active { border-color: var(--accent-primary); color: var(--text-primary); background: rgba(79,142,247,0.08); }
.dt-badge {
  background: rgba(255,255,255,0.08);
  color: var(--text-secondary);
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 10px;
}
.dt-badge.rose   { background: rgba(251,113,133,0.15); color: #fb7185; }
.dt-badge.violet { background: rgba(167,139,250,0.15); color: #a78bfa; }
.dt-tab.active .dt-badge { background: rgba(79,142,247,0.2); color: #4f8ef7; }

/* ── Search ── */
.dt-search-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px;
  margin-bottom: 12px;
  transition: border-color 0.2s;
}
.dt-search-wrap:focus-within { border-color: var(--accent-primary); }
.dt-search-wrap svg { color: var(--text-muted); flex-shrink: 0; }
.dt-search-wrap input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-size: 13px;
  font-family: var(--font-body);
}
.dt-search-wrap input::placeholder { color: var(--text-muted); }
#search-count {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  white-space: nowrap;
}

/* ── List panel ── */
.dt-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.dt-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s;
}
.dt-row:last-child { border-bottom: none; }
.dt-row:hover { background: rgba(255,255,255,0.03); }
.dt-num {
  width: 32px;
  text-align: right;
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  flex-shrink: 0;
}
.dt-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, #4f8ef7 0%, #a78bfa 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
  text-transform: uppercase;
}
.dt-username {
  flex: 1;
  font-size: 13px;
  color: var(--text-primary);
  text-decoration: none;
}
.dt-username:hover { color: var(--accent-primary); }
.dt-chip {
  font-size: 10px;
  font-family: var(--font-mono);
  padding: 2px 9px;
  border-radius: 4px;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
.chip-mutual  { background: rgba(45,212,191,0.12); color: #2dd4bf; }
.chip-fan     { background: rgba(167,139,250,0.12); color: #a78bfa; }
.chip-nfb     { background: rgba(251,113,133,0.12); color: #fb7185; }
.chip-follows { background: rgba(79,142,247,0.12);  color: #4f8ef7; }
.dt-ig-link {
  opacity: 0.3;
  transition: opacity 0.2s;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 11px;
}
.dt-row:hover .dt-ig-link { opacity: 0.8; }

.dt-empty {
  padding: 48px 20px;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
  font-family: var(--font-mono);
}

/* Pagination */
.dt-pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-top: 1px solid rgba(255,255,255,0.05);
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}
.dt-page-btns { display: flex; gap: 6px; }
.dt-page-btn {
  padding: 4px 10px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 11px;
  transition: all 0.15s;
}
.dt-page-btn:hover:not(:disabled) { border-color: var(--accent-primary); color: var(--text-primary); }
.dt-page-btn:disabled { opacity: 0.3; cursor: default; }
.dt-page-btn.current { border-color: var(--accent-primary); color: var(--accent-primary); background: rgba(79,142,247,0.1); }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {

  const fSet  = new Set(followersArr);
  const foSet = new Set(followingArr);

  const datasets = {
    followers:     followersArr.map(u => ({ u, chip: foSet.has(u) ? ['Mutual','mutual'] : ['Fan only','fan'] })),
    following:     followingArr.map(u => ({ u, chip: fSet.has(u)  ? ['Mutual','mutual'] : ['Not following back','nfb'] })),
    notfollowback: followingArr.filter(u => !fSet.has(u)).map(u => ({ u, chip: ['You follow · they don\'t','nfb'] })),
    fans:          followersArr.filter(u => !foSet.has(u)).map(u => ({ u, chip: ['They follow · you don\'t','fan'] })),
  };

  // Update badges
  document.getElementById('badge-notfollowback').textContent = datasets.notfollowback.length;
  document.getElementById('badge-fans').textContent          = datasets.fans.length;

  const PAGE_SIZE = 50;
  const state = { tab: 'followers', query: '', pages: {followers:0,following:0,notfollowback:0,fans:0} };

  function avatarColor(u) {
    const colors = ['#4f8ef7','#2dd4bf','#a78bfa','#fb7185','#f59e0b','#10b981'];
    let h = 0; for (let c of u) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
    return colors[Math.abs(h) % colors.length];
  }

  function renderPanel(tab) {
    const panel = document.getElementById('panel-' + tab);
    const q = state.query.toLowerCase();
    const data = datasets[tab];
    const filtered = q ? data.filter(d => d.u.toLowerCase().includes(q)) : data;
    const page = state.pages[tab];
    const total = filtered.length;
    const start = page * PAGE_SIZE;
    const slice = filtered.slice(start, start + PAGE_SIZE);

    if (total === 0) {
      panel.innerHTML = `<div class="dt-empty">${q ? 'No results for "' + q + '"' : 'No data'}</div>`;
      return;
    }

    let html = slice.map((d, i) => {
      const num = start + i + 1;
      const initial = d.u[0] || '?';
      const col = avatarColor(d.u);
      return `<div class="dt-row">
        <span class="dt-num">${num}</span>
        <span class="dt-avatar" style="background:${col}">${initial}</span>
        <a class="dt-username" href="https://instagram.com/${d.u}" target="_blank">${d.u}</a>
        <span class="dt-chip chip-${d.chip[1]}">${d.chip[0]}</span>
        <a class="dt-ig-link" href="https://instagram.com/${d.u}" target="_blank">↗</a>
      </div>`;
    }).join('');

    // Pagination
    const totalPages = Math.ceil(total / PAGE_SIZE);
    if (totalPages > 1) {
      const prevDis = page === 0 ? 'disabled' : '';
      const nextDis = page >= totalPages - 1 ? 'disabled' : '';
      const showing = `${start + 1}–${Math.min(start + PAGE_SIZE, total)} of ${total}`;
      html += `<div class="dt-pagination">
        <span>${showing}</span>
        <div class="dt-page-btns">
          <button class="dt-page-btn" ${prevDis} onclick="changePage('${tab}',-1)">← Prev</button>
          <button class="dt-page-btn current">${page + 1} / ${totalPages}</button>
          <button class="dt-page-btn" ${nextDis} onclick="changePage('${tab}',1)">Next →</button>
        </div>
      </div>`;
    } else {
      html += `<div class="dt-pagination"><span>${total} accounts</span></div>`;
    }

    panel.innerHTML = html;

    // Update search count
    if (q) {
      document.getElementById('search-count').textContent = total + ' result' + (total !== 1 ? 's' : '');
    } else {
      document.getElementById('search-count').textContent = '';
    }
  }

  window.changePage = function(tab, dir) {
    const q = state.query.toLowerCase();
    const total = Math.ceil((q ? datasets[tab].filter(d=>d.u.toLowerCase().includes(q)) : datasets[tab]).length / PAGE_SIZE);
    state.pages[tab] = Math.max(0, Math.min(state.pages[tab] + dir, total - 1));
    renderPanel(tab);
  };

  function switchTab(tab) {
    state.tab = tab;
    document.querySelectorAll('.dt-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    ['followers','following','notfollowback','fans'].forEach(t => {
      document.getElementById('panel-' + t).style.display = t === tab ? '' : 'none';
    });
    renderPanel(tab);
  }

  document.querySelectorAll('.dt-tab').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  document.getElementById('universal-search').addEventListener('input', function() {
    state.query = this.value;
    Object.keys(state.pages).forEach(k => state.pages[k] = 0);
    renderPanel(state.tab);
  });

  // Auto-open tab from URL ?tab=
  const urlTab = new URLSearchParams(window.location.search).get('tab');
  switchTab(['followers','following','notfollowback','fans'].includes(urlTab) ? urlTab : 'followers');
});
</script>

{% endblock %}
